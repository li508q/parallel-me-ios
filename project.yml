name: ParallelMe
options:
  bundleIdPrefix: com.parallelme
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
packages:
  ParallelMeIOS:
    path: .
targets:
  ParallelMe:
    type: application
    platform: iOS
    sources:
      - path: App/ParallelMe
    dependencies:
      - package: ParallelMeIOS
        product: ParallelMeCore
      - package: ParallelMeIOS
        product: ParallelMeDesign
      - package: ParallelMeIOS
        product: ParallelMeUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parallelme.app
        INFOPLIST_KEY_CFBundleDisplayName: ParallelMe
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_BackgroundColor: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
